version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  api1:
    build: .
    environment:
      INSTANCE_ID: api-1
      PORT: 4000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis

  api2:
    build: .
    environment:
      INSTANCE_ID: api-2
      PORT: 4000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis

  api3:
    build: .
    environment:
      INSTANCE_ID: api-3
      PORT: 4000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - '8080:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
      - api3
